<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-21 // ROUTE PLANNER</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="header-left">
        <div>
            <h1>M-21 // TERMINAL_V5</h1>
            <div style="font-size: 0.85rem; color: #aaa;">SYSTEM: STANTON | LOCAL OVERRIDE: ACTIVE</div>
        </div>
        <img src="assets\logo.jpg" alt="Logo" class="terminal-logo">
    </div>
    <div id="sys-time">SYS_CLK: 00:00:00</div>
</header>

<div class="main-container">
    <div class="control-panel">
        <div class="panel-section">
            <label>SHIP IDENTIFICATION:</label>
            <select id="ship-select"></select>
            
            <label style="margin-top: 10px;">QUANTUM DRIVE UNIT:</label>
            <select id="drive-select"></select>
        </div>

        <div class="panel-section">
            <label>SELECT NAV POINT:</label>
            <select id="location-select"></select>
            <button id="add-stop-btn">+ APPEND TO ROUTE</button>
        </div>

        <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden;" class="route-panel">
            <label style="margin-bottom: 10px;">ACTIVE FLIGHT PLAN:</label>
            <div class="route-list" id="route-list"></div>
            <div class="total-dist" id="total-dist">TOTAL: 0.00 Gm</div>
        </div>

        <div class="fuel-status-container">
            <div class="label-row">
                <span>FUEL_RESERVES // -0.1_SCUs_QT_Capacity</span>
                <span id="fuel-percent">100%</span>
            </div>
            <div class="fuel-bar-bg">
                <div id="fuel-bar-fill"></div>
            </div>
            <div id="route-warnings"></div>
        </div>

        <div>
            <button class="danger" id="clear-route-btn">[ PURGE FLIGHT PLAN ]</button>
        </div>
    </div>

    <div class="map-container">
        <canvas id="mapCanvas"></canvas>
    </div>
</div>

<script src="data/locations.js"></script>
<script src="data/quantumdrives.js"></script>
<script src="data/ships.js"></script>
<script src="js/app.js"></script>

</body>
</html>
